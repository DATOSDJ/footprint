name: footprint
description: Track your footprint on the map
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location & Background
  geolocator: ^13.0.2
  flutter_foreground_task: ^8.13.0
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Utils
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/geojson/
